<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
  <title>BlockOrbit | Professional Trading Platform</title>
  <link rel="icon" href="https://i.postimg.cc/6qxHW6rX/download.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag SDK (Kept for reference, but logic relies on timer now) -->
  <script src='//libtl.com/sdk.js' data-zone='10116329' data-sdk='show_10116329'></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase v9 Modular -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      /* Professional Exchange Color Scheme (Dark Mode with Gold Accents) */
      --primary: #FCD535; /* Binance Gold */
      --primary-hover: #e0c030;
      --bg-main: #0B0E11;
      --bg-card: #1E2329;
      --bg-input: #2B3139;
      --text-main: #EAECEF;
      --text-secondary: #848E9C;
      --text-muted: #5E6673;
      --accent-green: #0ECB81;
      --accent-red: #F6465D;
      --accent-blue: #1E88E5;
      --border-color: #2B3139;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
    }
    
    #app {
      display: none;
      min-height: 100vh;
      padding-bottom: 80px;
      background: var(--bg-main);
    }
    
    #main-content {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    
    .loading-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-input);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Balance Display (TON Only) */
    .balance-container {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }
    
    .ton-balance {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ton-icon { width: 20px; height: 20px; border-radius: 50%; }
    .ton-amount { font-size: 14px; font-weight: 700; color: var(--primary); }

    /* Sections */
    .section-header { text-align: center; padding: 30px 0 16px; }
    .section-title { font-size: 24px; font-weight: 800; color: var(--text-main); }
    .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    /* Buttons */
    .btn-primary, .btn-claim {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #0B0E11;
    }
    
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--text-muted); color: var(--bg-main); cursor: not-allowed; transform: none; }
    
    .btn-claim {
      background: var(--accent-green);
      color: #fff;
      animation: btnGlow 2s infinite;
    }
    
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(14, 203, 129, 0.3); }
      50% { box-shadow: 0 0 15px rgba(14, 203, 129, 0.6); }
    }

    /* Live Prices */
    .live-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .price-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .price-symbol { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
    .price-value { font-size: 18px; font-weight: 800; color: var(--text-main); margin-top: 4px; }
    .price-change { font-size: 12px; font-weight: 700; margin-top: 4px; }
    .price-change.positive { color: var(--accent-green); }
    .price-change.negative { color: var(--accent-red); }

    /* Trade Plans */
    .plan {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .plan-h {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .plan-ic {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: bold;
      font-size: 18px;
    }
    
    .plan-tt { font-size: 18px; font-weight: 800; color: var(--text-main); }
    .plan-pr { font-size: 14px; color: var(--primary); font-weight: 700; margin-top: 2px; }
    
    .plan-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }
    
    .g-it {
      background: var(--bg-input);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    
    .g-l { font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .g-v { font-size: 16px; font-weight: 800; color: var(--text-main); margin-top: 4px; }

    .prog { margin: 12px 0; }
    .progbar { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
    .progfill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--primary)); width: 0%; transition: width 0.5s; }
    .progtext { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; font-weight: 600; }
    .countdown { text-align: center; font-size: 13px; color: var(--primary); font-weight: 700; margin: 10px 0; }

    /* Wallet Redesign */
    .wallet-dashboard {
      padding: 20px 0;
    }
    
    .wallet-balance-card {
      background: linear-gradient(135deg, #1E2329 0%, #2B3139 100%);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    
    .wallet-balance-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(252, 213, 53, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    
    .wb-label { font-size: 14px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .wb-value { font-size: 36px; font-weight: 800; color: var(--text-main); margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .wb-value img { width: 32px; height: 32px; }
    
    .wallet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .wallet-action-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .wallet-action-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
    .wallet-action-btn:active { transform: translateY(0); }
    
    .wab-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(252, 213, 53, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .wab-icon img { width: 20px; height: 20px; }
    .wab-text { font-size: 14px; font-weight: 700; color: var(--text-main); }
    
    .wallet-menu-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .wallet-menu-item:hover { background: var(--bg-input); }
    .wmi-icon { width: 24px; height: 24px; object-fit: contain; opacity: 0.8; }
    .wmi-text { flex: 1; font-size: 15px; font-weight: 600; }
    .wmi-arrow { color: var(--text-muted); font-size: 18px; }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: var(--text-secondary); font-weight: 700; margin-bottom: 8px; display: block; }
    
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      outline: none;
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    
    .input:focus { border-color: var(--primary); }
    
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-input);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      word-break: break-all;
      font-size: 13px;
    }
    
    .copy {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      transition: all 0.2s;
    }
    
    .copy:hover { border-color: var(--primary); }
    .copy img { width: 14px; height: 14px; filter: brightness(0) invert(1); }

    /* Earn Section */
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-box-label { font-size: 12px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .stat-box-value { font-size: 20px; font-weight: 800; color: var(--primary); margin-top: 8px; }
    
    .ad-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .ad-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .ad-reward { font-size: 14px; color: var(--accent-green); font-weight: 700; margin-bottom: 20px; }

    /* Milestone */
    .milestone-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .milestone-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .milestone-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .milestone-info { flex: 1; }
    .milestone-title { font-size: 16px; font-weight: 800; }
    .milestone-reward { font-size: 13px; color: var(--primary); font-weight: 700; }

    /* Tasks */
    .task-category {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .category-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; }
    .category-title { font-size: 16px; font-weight: 800; }
    
    .task-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-input);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    
    .task-image { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-color); }
    .task-info { flex: 1; }
    .task-name { font-size: 14px; font-weight: 700; }
    .task-reward { font-size: 12px; color: var(--accent-green); font-weight: 800; }
    
    .task-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #000;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-btn.completed { background: var(--text-muted); color: #fff; cursor: not-allowed; }

    /* Referrals */
    .referral-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .referral-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .referral-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; }
    .referral-title { font-size: 16px; font-weight: 800; }
    
    .referral-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .referral-stat { background: var(--bg-input); border-radius: 12px; padding: 14px; text-align: center; }
    .referral-stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .referral-stat-value { font-size: 18px; font-weight: 800; color: var(--primary); margin-top: 6px; }

    .referral-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-input);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    
    .referral-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
    .referral-info { flex: 1; }
    .referral-name { font-size: 14px; font-weight: 700; }
    .referral-id { font-size: 12px; color: var(--text-secondary); }
    .referral-balance { font-size: 14px; font-weight: 800; color: var(--primary); }
    .referral-commission { font-size: 12px; color: var(--accent-blue); font-weight: 700; }

    /* Notification */
    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #000;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 10000;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { top: 0px; opacity: 0; }
      to { top: 20px; opacity: 1; }
    }

    /* Nav */
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--bg-card);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 10px;
      z-index: 1000;
      box-shadow: 0 -4px 16px rgba(0,0,0,.2);
    }
    
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px;
      border-radius: 12px;
      transition: .2s;
    }
    
    .nav-icon { width: 24px; height: 24px; object-fit: contain; filter: grayscale(100%) brightness(.7); transition: all 0.2s; }
    .nav-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); transition: all 0.2s; }
    
    .nav-btn.active .nav-icon { filter: none; }
    .nav-btn.active .nav-label { color: var(--primary); }

    /* Full Screen Modal */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: none;
      flex-direction: column;
      z-index: 9999;
      overflow-y: auto;
    }
    
    .modal-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .modal-title { font-size: 18px; font-weight: 800; color: var(--text-main); }
    
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--bg-input);
      border: none;
      color: var(--text-main);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .modal-close:hover { background: var(--text-muted); }
    
    .modal-content {
      flex: 1;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    
    .modal-content-box {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Timer */
    .timer {
      background: rgba(246, 70, 93, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      margin-bottom: 16px;
    }
    .t-t { color: var(--accent-red); font-weight: 800; }

    /* Chart Container */
    .chart-container {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .chart-title { font-size: 12px; font-weight: 800; text-align: center; margin-bottom: 8px; color: var(--text-secondary); }

    /* QR Code */
    .qr-container {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      display: inline-block;
      margin: 16px auto;
    }

    /* PROFESSIONAL UI UPGRADES */
    
    /* Modern Redeem Section */
    .redeem-professional {
      background: linear-gradient(135deg, #2B3139 0%, #1E2329 100%);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .redeem-professional::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(252, 213, 53, 0.05) 0%, transparent 70%);
    }

    .redeem-input-group {
      display: flex;
      gap: 8px;
      margin: 16px 0;
      position: relative;
      z-index: 1;
    }

    .redeem-input {
      flex: 1;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-family: monospace;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
      text-transform: uppercase;
    }
    
    .redeem-input:focus { border-color: var(--primary); }

    .redeem-btn {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 0 24px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: .2s;
      white-space: nowrap;
    }
    
    .redeem-btn:hover { background: var(--primary-hover); }

    /* Modern History/Activity Items */

    const userRef = (uid)=> database.ref('users/'+uid);

    async function loadUser() {
      const snap = await userRef(userId).once('value');
      if (snap.exists()) return snap.val();
      const init = {
        tonBalance:0, 
        purchasedPlans:{}, activeTrades:{},
        depositHistory:[], withdrawHistory:[], tradeHistory:[],
        avatar:userAvatar, name:userName, referrals:0, completedTasks:{},

    function todayISO(){ return new Date().toISOString().split('T')[0]; }
    function weekStartISO(){
      const d=new Date(); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1); d.setDate(diff);
      return d.toISOString().split('T')[0];
    }
    function monthStartISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }

    function save(partial){
      userData = { ...userData, ...partial };
      userRef(userId).update(partial).catch(()=>{});
      localStorage.setItem('blockorbit_user_'+userId, JSON.stringify(userData));
      if (partial.tonBalance!==undefined) {
        tonBalance = partial.tonBalance;
        document.getElementById('tonBalance').textContent = fmt(tonBalance);

      if (!userData.referredBy) return;
      const commission = earnedAmount * 0.2;
      const referrerId = userData.referredBy;
      
      database.ref('users/' + referrerId).once('value').then(refSnap => {
        if (refSnap.exists()) {
          const referrerData = refSnap.val();
          const newBalance = (referrerData.tonBalance || 0) + commission;
          database.ref('users/' + referrerId).update({ tonBalance: newBalance, totalReferralCommission: (referrerData.totalReferralCommission || 0) + commission });

          <div class="price-card">
            <div class="price-symbol">ETH/USDT</div>
            <div class="price-value">$${(eth.price).toLocaleString()}</div>
            <div class="price-change ${eth.change>=0?'positive':'negative'}">${(eth.change>=0?'+':'')}${(eth.change||0).toFixed(2)}%</div>

        </div>

        ${TRADE_PLANS.map(p=>{
          const purchased = !!purchasedPlans[p.id];
          const tr = activeTrades[p.id];
          const canClaim = tr ? (now()-tr.lastClaim)>=86400 : false;
          const prog = tr ? (tr.claimedDays/p.duration*100) : 0;

              <div class="plan-h">
                <div class="plan-ic">${p.icon}</div>
                <div>

                  <div class="g-l">Daily</div>
                  <div class="g-v">${p.dailyEarning} TON</div>
                </div>

                  <div class="g-l">Duration</div>

                  <div class="progtext">Progress: ${tr.claimedDays}/${p.duration} days</div>

              ` : `
                <button class="btn-primary" id="buy_${p.id}" ${purchased?'disabled':''}>${purchased?'Purchased':'Buy Plan'}</button>
              `}
            </div>
          `;
        }).join('')}
      `;

        const claim=document.getElementById(`claim_${p.id}`);

          buy.addEventListener('click', ()=>{

            if ((now()-tr.lastClaim)<86400){ notify('Claim available every 24h'); return; }
            const earned=p.dailyEarning;
            const newBal=tonBalance+earned;
            tr.lastClaim=now(); tr.claimedDays+=1; tr.totalEarned+=earned;
            
            awardReferralCommission(earned);
            
            if (tr.claimedDays>=p.duration){
              const copy={...activeTrades}; delete copy[p.id];
              save({ tonBalance:newBal, activeTrades:copy });
              notify(`Plan completed. Total earned ${tr.totalEarned} TON`);
              sendBot(`🏆 <b>Plan Completed</b>\nPlan: ${p.name}\nTotal Earned: ${tr.totalEarned} TON`);
            }else{
              save({ tonBalance:newBal, activeTrades:{...activeTrades} });
              notify(`Claimed ${earned} TON from ${p.name}`);
              sendBot(`💰 <b>Daily Claimed</b>\nPlan: ${p.name}\nEarned: ${earned} TON`);
            }
            tradeHistory.push({ type:'claim', planId:p.id, planName:p.name, amount:earned, timestamp:now() });
            save({ tradeHistory });
            renderHome();
          });
        }
      });

      setInterval(()=>{
        Object.values(activeTrades).forEach(tr=>{
          const el=document.getElementById(`cd_${tr.planId}`); if(!el) return;
          el.textContent = `Next claim in: ${formatTime(86400-(now()-tr.lastClaim))}`;
        });
      },1000);
    }

    function showWithdrawModal() {

      const hasDeposit = userData.hasDeposit || depositHistory.length > 0;
      const withdrawalCount = userData.withdrawalCount || 0;

      // Logic: If count > 0 AND !hasDeposit, then block.
      const allowWithdraw = isFirstFree || hasDeposit;

      if (!isFirstFree && !hasDeposit) {
        warningMsg = `<div style="color:var(--accent-red);text-align:center;margin-bottom:16px;padding:12px;background:rgba(246,70,93,0.1);border-radius:8px;font-size:13px">⚠️ Deposit required for 2nd withdrawal</div>`;

    // Earn
    function renderEarn(){
      const a = userData.adStats||{today:0,yesterday:0,thisWeek:0,thisMonth:0,lifetime:0};
      const html = `
        <div class="section-header">
          <div class="section-title">Earn TON</div>
          <div class="section-subtitle">Watch ads and complete tasks to earn rewards</div>
        </div>

        <div class="stats-row">
          <div class="stat-box"><div class="stat-box-label">Today</div><div class="stat-box-value">${a.today||0}</div></div>
          <div class="stat-box"><div class="stat-box-label">Lifetime</div><div class="stat-box-value">${a.lifetime||0}</div></div>
        </div>

        <div class="ad-card">
          <div class="ad-title">Watch Advertisement</div>
          <div class="ad-reward">Earn 0.0001 TON after 10 seconds</div>
          <button class="btn-primary" id="watchAd">${adLoading?'Processing...':'Watch Ad'}</button>
        </div>

        <div class="milestone-card">
          <div class="milestone-header">
            <div class="milestone-icon">🏆</div>
            <div class="milestone-info">
              <div class="milestone-title">Milestone Rewards</div>
              <div class="milestone-reward">Complete ads to unlock rewards</div>
            </div>
          </div>
          ${[
            {id:'m1500', need:1500, amt:0.5, label:'1,500 Ads'},
            {id:'m2500', need:2500, amt:1.0, label:'2,500 Ads'},
            {id:'m5500', need:5500, amt:2.5, label:'5,500 Ads'}
          ].map(m=>{
            const can = (a.lifetime||0)>=m.need && !userData.milestones?.[`milestone${m.need}Claimed`];
            const txt = userData.milestones?.[`milestone${m.need}Claimed`] ? 'Claimed' : (can?'Claim Now!':`${a.lifetime||0}/${m.need}`);
            const prog = Math.min((a.lifetime||0)/m.need*100, 100);
            return `
              <div class="milestone-progress" style="margin-top:16px">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                  <div style="font-weight:700;font-size:14px">${m.label}</div>
                  <div style="color:var(--accent-green);font-weight:700;font-size:14px">+${m.amt} TON</div>
                </div>
                <div class="progbar"><div class="progfill" style="width:${prog}%"></div></div>
                <div class="progtext">${a.lifetime||0}/${m.need} ads completed</div>
                <button class="btn-primary" style="margin-top:10px" id="${m.id}" ${can?'':'disabled'}>${txt}</button>
              </div>
            `;
          }).join('')}
        </div>

        <div id="tasksList"></div>
      `;
      document.getElementById('main-content').innerHTML = html;

      document.getElementById('watchAd').onclick = ()=>{
        if (adLoading) return;
        adLoading = true; 
        const btn = document.getElementById('watchAd');
        btn.textContent = 'Please wait...';
        btn.disabled = true;

        // 10 Second Timer Logic
        let secondsLeft = 10;
        
        const countdown = setInterval(() => {
          secondsLeft--;
          btn.textContent = `Wait ${secondsLeft}s...`;
          
          if (secondsLeft <= 0) {
            clearInterval(countdown);
            // Process Reward
            const reward = 0.0001;
            const today = todayISO(), ws = weekStartISO(), ms = monthStartISO();
            
            if (userData.adStats.lastAdDate !== today) { 
              userData.adStats.yesterday = userData.adStats.today; 
              userData.adStats.today = 0; 
              userData.adStats.lastAdDate = today; 
            }
            if (userData.adStats.lastWeekReset !== ws) { 
              userData.adStats.thisWeek = 0; 
              userData.adStats.lastWeekReset = ws; 
            }
            if (userData.adStats.lastMonthReset !== ms) { 
              userData.adStats.thisMonth = 0; 
              userData.adStats.lastMonthReset = ms; 
            }
            
            userData.adStats.today++; 
            userData.adStats.thisWeek++; 
            userData.adStats.thisMonth++; 
            userData.adStats.lifetime++;
            
            const newBalance = tonBalance + reward;
            
            save({ 
              tonBalance: newBalance, 
              adStats: userData.adStats 
            });
            
            tonBalance = newBalance;
            document.getElementById('tonBalance').textContent = fmt(tonBalance);
            
            awardReferralCommission(reward);
            notify(`Earned ${reward} TON!`);
            
            sendBot(`📺 <b>Ad Watched</b>\nUser: ${userName}\nEarned: ${reward} TON\nTotal Ads: ${userData.adStats.lifetime}`);
            
            adLoading = false;
            btn.textContent = 'Watch Ad';
            btn.disabled = false;
            renderEarn(); // Refresh UI to show updated stats
          }
        }, 1000);
      };

      const setMilestone=(need,amt)=>{
        const key=`milestone${need}Claimed`;
        if ((userData.adStats?.lifetime||0)>=need && !userData.milestones?.[key]){
          const ms={...(userData.milestones||{}), [key]:true };
          save({ tonBalance: tonBalance+amt, milestones: ms });
          notify(`Claimed ${amt} TON milestone reward!`);
          renderEarn();
        }
      };
      document.getElementById('m1500')?.addEventListener('click', ()=>setMilestone(1500,0.5));
      document.getElementById('m2500')?.addEventListener('click', ()=>setMilestone(2500,1.0));
      document.getElementById('m5500')?.addEventListener('click', ()=>setMilestone(5500,2.5));

      loadTasks();
    }

    function loadTasks(){
      database.ref('tasks').once('value').then(s=>{
        const tasks=s.exists()?s.val():{};
        const categories = ['Project', 'Partner', 'Advertise'];
        let html='';
        
        categories.forEach(category=>{
          const categoryTasks = Object.keys(tasks).filter(id => tasks[id].category === category);
          if(categoryTasks.length > 0){
            html += `
              <div class="task-category">
                <div class="category-header">
                  <div class="category-icon">📂</div>
                  <div class="category-title">${category}</div>
                </div>
                ${categoryTasks.map(id=>{
                  const t=tasks[id]; const done = !!(userData.completedTasks&&userData.completedTasks[id]);
                  return `
                    <div class="task-card">
                      <img src="${t.photo}" class="task-image" alt="${t.name}">
                      <div class="task-info">
                        <div class="task-name">${t.name}</div>
                        <div class="task-reward">+${t.amount} TON</div>
                      </div>
                      <button class="task-btn ${done?'completed':''}" data-id="${id}">${done?'Done':'Start'}</button>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }
        });
        
        const c=document.createElement('div'); 
        c.className='card'; 
        c.innerHTML=`<div class="section-subtitle" style="text-align:center;margin-bottom:12px;font-weight:800">Tasks</div>${html||'<div class="section-subtitle" style="text-align:center;padding:20px 0">No tasks available</div>'}`;
        document.getElementById('main-content').appendChild(c);

        document.querySelectorAll('.task-btn').forEach(btn=>{
          btn.onclick=()=>{
            const id=btn.dataset.id; const t=tasks[id]; if(!t) return;
            if (userData.completedTasks && userData.completedTasks[id]){ window.open(t.link,'_blank'); return; }
            if (pendingTaskRewards[id]){ notify('Processing...'); return; }
            pendingTaskRewards[id]=true; btn.disabled=true; btn.textContent='Processing...';
            window.open(t.link,'_blank');
            setTimeout(()=>{
              if (!userData.completedTasks) userData.completedTasks={};
              userData.completedTasks[id]=true;
              const add=parseFloat(t.amount)||0;
              awardReferralCommission(add);
              save({ tonBalance: tonBalance+add, completedTasks: userData.completedTasks });
              pendingTaskRewards[id]=false; btn.textContent='Done'; notify(`+${add} TON`);
            },15000);
          };
        });
      });
    }
