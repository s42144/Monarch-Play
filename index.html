<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
  <title>BlockOrbit | Professional Trading Platform</title>
  <link rel="icon" href="https://i.postimg.cc/6qxHW6rX/download.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag SDK -->
  <script src='//libtl.com/sdk.js' data-zone='10116329' data-sdk='show_10116329'></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase v9 Modular -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      /* Professional Exchange Color Scheme (Dark Mode with Gold Accents) */
      --primary: #FCD535; /* Gold */
      --primary-hover: #e0c030;
      --bg-main: #0B0E11;
      --bg-card: #1E2329;
      --bg-input: #2B3139;
      --text-main: #EAECEF;
      --text-secondary: #848E9C;
      --text-muted: #5E6673;
      --accent-green: #0ECB81;
      --accent-red: #F6465D;
      --accent-blue: #1E88E5;
      --border-color: #2B3139;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --gold-gradient: linear-gradient(135deg, #FCD535 0%, #E2B620 100%);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
    }
    
    #app {
      display: none;
      min-height: 100vh;
      padding-bottom: 80px;
      background: var(--bg-main);
    }
    
    #main-content {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    
    .loading-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-input);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Balance Display (Custom Image) */
    .balance-container {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }
    
    .ton-balance {
      background: rgba(30, 35, 41, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 6px 12px 6px 6px;
      border: 1px solid rgba(252, 213, 53, 0.2);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Updated Balance Icon */
    .ton-icon { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
    .ton-amount { font-size: 15px; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; }

    /* Sections */
    .section-header { text-align: center; padding: 30px 0 16px; }
    .section-title { font-size: 24px; font-weight: 800; color: var(--text-main); }
    .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    /* Buttons */
    .btn-primary, .btn-claim {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #0B0E11;
      box-shadow: 0 4px 12px rgba(252, 213, 53, 0.2);
    }
    
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { background: var(--text-muted); color: var(--bg-main); cursor: not-allowed; opacity: 0.6; }
    
    .btn-claim {
      background: var(--accent-green);
      color: #fff;
      animation: btnGlow 2s infinite;
    }
    
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(14, 203, 129, 0.3); }
      50% { box-shadow: 0 0 15px rgba(14, 203, 129, 0.6); }
    }

    /* Live Prices */
    .live-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .price-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    
    .price-symbol { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
    .price-value { font-size: 16px; font-weight: 800; color: var(--text-main); margin-top: 4px; }
    .price-change { font-size: 11px; font-weight: 700; margin-top: 4px; }
    .price-change.positive { color: var(--accent-green); }
    .price-change.negative { color: var(--accent-red); }

    /* Trade Plans */
    .plan {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .plan-h {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .plan-ic {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: bold;
    }
    
    .plan-tt { font-size: 16px; font-weight: 800; color: var(--text-main); }
    .plan-pr { font-size: 13px; color: var(--primary); font-weight: 700; }
    
    .plan-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0;
    }
    
    .g-it {
      background: var(--bg-input);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    
    .g-l { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .g-v { font-size: 14px; font-weight: 800; color: var(--text-main); margin-top: 4px; }

    .prog { margin: 8px 0; }
    .progbar { height: 6px; background: var(--bg-input); border-radius: 3px; overflow: hidden; }
    .progfill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.5s; }
    .progtext { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
    .countdown { text-align: center; font-size: 12px; color: var(--primary); font-weight: 700; margin: 8px 0; }

    /* PROFESSIONAL WALLET REDESIGN */
    .wallet-dashboard {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wallet-hero-card {
      background: var(--gold-gradient);
      border-radius: 20px;
      padding: 24px;
      color: #0B0E11;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(252, 213, 53, 0.25);
    }

    .wallet-hero-bg {
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      filter: blur(40px);
    }

    .wallet-hero-label {
      font-size: 13px;
      font-weight: 700;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .wallet-hero-balance {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
    }

    .wallet-hero-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .wallet-action-btn {
      background: rgba(11, 14, 17, 0.9);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.2s;
    }
    
    .wallet-action-btn:active { transform: scale(0.98); }

    .wallet-menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .wallet-menu-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      gap: 10px;
    }

    .wallet-menu-item:hover { border-color: var(--primary); background: rgba(252, 213, 53, 0.05); }
    
    .w-icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .w-icon-circle img { width: 24px; height: 24px; filter: brightness(0) invert(1); }

    .w-label { font-size: 14px; font-weight: 700; color: var(--text-main); }
    .w-sub { font-size: 11px; color: var(--text-secondary); }

    /* History List (Clean) */
    .history-list { max-height: 300px; overflow-y: auto; }
    .history-item {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid transparent;
      transition: 0.2s;
    }
    
    .history-item:hover { border-color: var(--border-color); }
    
    .history-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
    .history-id { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
    /* Removed history-status as requested */
    
    .history-details { display: flex; justify-content: space-between; align-items: flex-end; }
    .history-amount { font-size: 18px; font-weight: 800; color: var(--primary); }
    .history-date { font-size: 11px; color: var(--text-muted); }
    .history-extra { font-size: 11px; color: var(--text-secondary); margin-top: 6px; font-family: monospace; word-break: break-all; opacity: 0.7; }

    /* Earn Section */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-box-label { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .stat-box-value { font-size: 16px; font-weight: 800; color: var(--primary); margin-top: 4px; }
    
    .ad-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .ad-title { font-size: 16px; font-weight: 800; }
    .ad-reward { font-size: 12px; color: var(--accent-green); font-weight: 700; margin: 6px 0; }

    /* Milestone */
    .milestone-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .milestone-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .milestone-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .milestone-info { flex: 1; }
    .milestone-title { font-size: 16px; font-weight: 800; }
    .milestone-reward { font-size: 13px; color: var(--primary); font-weight: 700; }

    /* Tasks */
    .task-category {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .category-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; }
    .category-title { font-size: 16px; font-weight: 800; }
    
    .task-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-input);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    
    .task-image { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color); }
    .task-info { flex: 1; }
    .task-name { font-size: 14px; font-weight: 700; }
    .task-reward { font-size: 12px; color: var(--accent-green); font-weight: 800; }
    
    .task-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #000;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
    }
    
    .task-btn.completed { background: var(--text-muted); color: #fff; cursor: not-allowed; }

    /* Referrals */
    .referral-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .referral-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .referral-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; }
    .referral-title { font-size: 16px; font-weight: 800; }
    
    .referral-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .referral-stat { background: var(--bg-input); border-radius: 8px; padding: 12px; text-align: center; }
    .referral-stat-label { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .referral-stat-value { font-size: 16px; font-weight: 800; color: var(--primary); margin-top: 4px; }

    .referral-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-input);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    
    .referral-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-color); }
    .referral-info { flex: 1; }
    .referral-name { font-size: 14px; font-weight: 700; }
    .referral-id { font-size: 12px; color: var(--text-secondary); }
    .referral-balance { font-size: 14px; font-weight: 800; color: var(--primary); }
    .referral-commission { font-size: 12px; color: var(--accent-blue); font-weight: 700; }

    /* Notification */
    .notification {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #000;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 10000;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { top: 0px; opacity: 0; }
      to { top: 16px; opacity: 1; }
    }

    /* Nav */
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--bg-card);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 8px;
      z-index: 1000;
      box-shadow: 0 -4px 16px rgba(0,0,0,.2);
    }
    
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: .2s;
    }
    
    .nav-icon { width: 24px; height: 24px; object-fit: contain; filter: grayscale(100%) brightness(.7); }
    .nav-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); }
    
    .nav-btn.active .nav-icon { filter: none; }
    .nav-btn.active .nav-label { color: var(--primary); }

    /* Full Screen Modal */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: none;
      flex-direction: column;
      z-index: 9999;
      overflow-y: auto;
    }
    
    .modal-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .modal-title { font-size: 18px; font-weight: 800; color: var(--text-main); }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-input);
      border: none;
      color: var(--text-main);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .modal-close:hover { background: var(--text-muted); }
    
    .modal-content {
      flex: 1;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    
    .modal-content-box {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Timer */
    .timer {
      background: rgba(246, 70, 93, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      margin-bottom: 12px;
    }
    .t-t { color: var(--accent-red); font-weight: 800; }

    /* Chart Container */
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .chart-title { font-size: 12px; font-weight: 800; text-align: center; margin-bottom: 8px; color: var(--text-secondary); }

    @media(max-width:360px){
      .live-prices{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <img src="https://i.postimg.cc/6qxHW6rX/download.png" class="loading-logo" alt="BlockOrbit" />
    <div class="loading-text">BlockOrbit</div>
    <div class="loading-subtext">Initializing...</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="balance-container">
      <div class="ton-balance">
        <!-- Updated Balance Image -->
        <img src="https://i.postimg.cc/6qxHW6rX/download.png" class="ton-icon" alt="BlockOrbit" />
        <div class="ton-amount" id="tonBalance">0.000000</div>
      </div>
    </div>
    <div id="main-content"></div>

    <!-- Navigation Bar (Ranking Removed) -->
    <div class="nav-bar">
      <button class="nav-btn active" data-tab="home">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNGNUQ1MDAiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cG9seWxpbmUgcG9pbnRzPSIyMiAxMiAxOCAxMiAxNSAyMSA5IDMgNiAxMiAyIDEyIj48L3BvbHlsaW5lPjwvc3ZnPg==" alt="Trade" class="nav-icon" />
        <span class="nav-label">Trade</span>

          window.show_10116329().then(() => {
            adLoading = false;
            btn.textContent = 'Watch Ad';
            btn.disabled = false;
            
            // Success logic
            const reward = 0.0001;
            const today = todayISO(), ws = weekStartISO(), ms = monthStartISO();

      loadTasks();

    function loadTasks(){
      database.ref('tasks').once('value').then(s=>{
        const tasks=s.exists()?s.val():{};
        const categories = ['Project', 'Partner', 'Advertise'];
        let html='';
        
        categories.forEach(category=>{
          const categoryTasks = Object.keys(tasks).filter(id => tasks[id].category === category);
          if(categoryTasks.length > 0){
            html += `
              <div class="task-category">
                <div class="category-header">
                  <div class="category-icon">📂</div>
                  <div class="category-title">${category}</div>
                </div>
                ${categoryTasks.map(id=>{
                  const t=tasks[id]; const done = !!(userData.completedTasks&&userData.completedTasks[id]);
                  return `
                    <div class="task-card">
                      <img src="${t.photo}" class="task-image" alt="${t.name}">
                      <div class="task-info">
                        <div class="task-name">${t.name}</div>
                        <div class="task-reward">+${t.amount} TON</div>
                      </div>
                      <button class="task-btn ${done?'completed':''}" data-id="${id}">${done?'Done':'Start'}</button>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }
        });
        
        const c=document.createElement('div'); c.className='card'; c.innerHTML=`<div class="section-subtitle" style="text-align:center;margin-bottom:8px;font-weight:800">Tasks</div>${html||'<div class="section-subtitle" style="text-align:center">No tasks available</div>'}`;
        document.getElementById('main-content').appendChild(c);

        document.querySelectorAll('.task-btn').forEach(btn=>{
          btn.onclick=()=>{
            const id=btn.dataset.id; const t=tasks[id]; if(!t) return;
            if (userData.completedTasks && userData.completedTasks[id]){ window.open(t.link,'_blank'); return; }
            if (pendingTaskRewards[id]){ notify('Processing...'); return; }
            pendingTaskRewards[id]=true; btn.disabled=true; btn.textContent='Processing...';
            window.open(t.link,'_blank');
            setTimeout(()=>{
              if (!userData.completedTasks) userData.completedTasks={};
              userData.completedTasks[id]=true;
              const add=parseFloat(t.amount)||0;
              awardReferralCommission(add);
              save({ tonBalance: tonBalance+add, completedTasks: userData.completedTasks });
              pendingTaskRewards[id]=false; btn.textContent='Done'; notify(`+${add} TON`);
            },15000);
          };
        });
      });
    }

          <img src="${userData.avatar}" alt="avatar" style="width:80px;height:80px;border-radius:50%;border:3px solid var(--primary);object-fit:cover;margin-bottom:12px">
          <div style="font-weight:800;font-size:18px">${userData.name}</div>
          <div style="margin-top:6px"><span class="section-subtitle">ID:</span> <span style="color:var(--primary);font-weight:800">${userId}</span> <button class="copy" id="copyUid"><img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cmVjdCB4PSI5IiB5PSI5IiB3aWR0aD0iMTMiIGhlaWdodD0iMTMiIHJ4PSIyIiByeT0iMiI+PC9yZWN0PjxwYXRoIGQ9Ik01IDE1SDRhMiAyIDAgMCAxLTItMlY1YTIgMiAwIDAgMSAyLTJoMTQiYTIgMiAwIDAgMSAyIDJ2MSI+PC9wYXRoPjwvc3ZnPg==" alt="Copy"></button></div>
        </div>

        <!-- Wallet Input Section Removed as requested -->

        <div class="card">
          <div class="section-subtitle" style="text-align:center;margin-bottom:12px;font-weight:800">Referral Program</div>
          <div style="background:var(--bg-input);padding:12px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
             <div style="font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%" id="refLink">https://t.me/BlockOrbitBot/app?startapp=${userId}</div>
             <button class="copy" id="copyRef"><img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cmVjdCB4PSI5IiB5PSI5IiB3aWR0aD0iMTMiIGhlaWdodD0iMTMiIHJ4PSIyIiByeT0iMiI+PC9yZWN0PjxwYXRoIGQ9Ik01IDE1SDRhMiAyIDAgMCAxLTItMlY1YTIgMiAwIDAgMSAyLTJoMTQiYTIgMiAwIDAgMSAyIDJ2MSI+PC9wYXRoPjwvc3ZnPg==" alt="Copy"></button>
          </div>
          <button class="btn-primary" id="viewReferralsBtn">View My Referrals</button>
        </div>

        <div class="referral-card">
          <div class="referral-stats">
            <div class="referral-stat">
              <div class="referral-stat-label">Referrals</div>
              <div class="referral-stat-value">${referralCount||0}</div>
            </div>
            <div class="referral-stat">
              <div class="referral-stat-label">Commission</div>
              <div class="referral-stat-value">${fmt(totalReferralCommission)} TON</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-subtitle" style="text-align:center;margin-bottom:8px;font-weight:800">Redeem Code</div>
          <input id="redeem" maxlength="8" class="input" placeholder="Enter 8-digit code">
          <button class="btn-primary" style="margin-top:10px" id="redeemGo">Redeem</button>
        </div>
      `;
      document.getElementById('main-content').innerHTML = html;
      document.getElementById('copyUid').onclick=()=>copy(userId);
      document.getElementById('copyRef').onclick=()=>copy(document.getElementById('refLink').textContent);
      document.getElementById('redeemGo').onclick=()=>{
        const code=document.getElementById('redeem').value.trim(); if(code.length!==8){ notify('Enter valid 8-digit code'); return; }
        database.ref('redeemCodes/'+code).once('value').then(s=>{
          if(!s.exists()){ notify('Invalid or used code'); return; }
          const codeData = s.val();
          if (codeData.used >= codeData.maxUsers) { notify('Code limit reached'); return; }
          const reward = Math.random() * (0.20 - 0.01) + 0.01;
          database.ref('redeemCodes/' + code).update({ used: codeData.used + 1 });
          save({ tonBalance: tonBalance + reward });
          notify(`Redeemed ${fmt(reward)} TON`);
          document.getElementById('redeem').value='';
        });
      };
      document.getElementById('viewReferralsBtn').onclick = showReferralList;
    }

    function showReferralList() {
      const modal = document.getElementById('referralModal');
      const content = document.getElementById('referralListContent');
      database.ref('users').orderByChild('referredBy').equalTo(userId).once('value').then(snapshot => {
        if (snapshot.numChildren() === 0) {
          content.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-secondary)">You haven\'t referred anyone yet.</div>';
        } else {
          let html = '';
          snapshot.forEach(child => {
            const u = child.val();
            html += `<div class="referral-item"><img src="${u.avatar}" class="referral-avatar"><div class="referral-info"><div class="referral-name">${u.name}</div><div class="referral-id">ID: ${child.key}</div><div class="referral-balance">${fmt(u.tonBalance||0)} TON</div></div></div>`;
          });
          content.innerHTML = html;
        }
        modal.style.display = 'flex';
      });
    }

    // Modal Close
    document.getElementById('closeReferralModal').onclick = () => document.getElementById('referralModal').style.display = 'none';
    document.getElementById('referralModal').onclick = (e) => { if(e.target.id === 'referralModal') e.target.style.display = 'none'; };
    document.getElementById('closeDepositModal').onclick = () => document.getElementById('deposit-modal').style.display = 'none';
    document.getElementById('closeWithdrawModal').onclick = () => document.getElementById('withdraw-modal').style.display = 'none';
    document.getElementById('closeDepositHistoryModal').onclick = () => document.getElementById('deposit-history-modal').style.display = 'none';
    document.getElementById('closeWithdrawHistoryModal').onclick = () => document.getElementById('withdraw-history-modal').style.display = 'none';
    document.getElementById('closeActivitiesModal').onclick = () => document.getElementById('activities-modal').style.display = 'none';
    document.getElementById('closeTradesModal').onclick = () => document.getElementById('trades-modal').style.display = 'none';

    // Nav events
    document.querySelectorAll('.nav-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>showTab(btn.dataset.tab));
    });

    // Bootstrap
    async function bootstrap(){
      getTelegramUserData();
      await loadCryptoPrices();
      try{
        userData = await loadUser();
      }catch{
        const loc = localStorage.getItem('blockorbit_user_'+userId);
        userData = loc ? JSON.parse(loc) : { 
          tonBalance:0, purchasedPlans:{}, activeTrades:{}, depositHistory:[], withdrawHistory:[], tradeHistory:[], avatar:userAvatar, name:userName, referrals:0, completedTasks:{}, adStats:{today:0,yesterday:0,thisWeek:0,thisMonth:0,lifetime:0,lastAdDate:todayISO(),lastWeekReset:weekStartISO(),lastMonthReset:monthStartISO()}, milestones:{ m1500Claimed:false, m2500Claimed:false, m5500Claimed:false }, referralCommissions:{}, totalReferralCommission:0, createdAt: now(), referredBy: null, welcomed: false
        };
      }
      tonBalance = userData.tonBalance||0;
      purchasedPlans = userData.purchasedPlans||{};
      activeTrades = userData.activeTrades||{};
      depositHistory = userData.depositHistory||[];
      withdrawHistory = userData.withdrawHistory||[];
      tradeHistory = userData.tradeHistory||[];
      document.getElementById('tonBalance').textContent = fmt(tonBalance);

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      showTab('home');
      setInterval(loadCryptoPrices, 30000);
    }

    bootstrap();
  </script>
</body>
</html>
