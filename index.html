<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
  <title>BlockOrbit | Professional Trading Platform</title>
  <link rel="icon" href="https://i.postimg.cc/6qxHW6rX/download.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase v9 Modular -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      --primary: #FCD535;
      --primary-hover: #e0c030;
      --bg-main: #0B0E11;
      --bg-card: #1E2329;
      --bg-input: #2B3139;
      --text-main: #EAECEF;
      --text-secondary: #848E9C;
      --text-muted: #5E6673;
      --accent-green: #0ECB81;
      --accent-red: #F6465D;
      --accent-blue: #1E88E5;
      --border-color: #2B3139;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
    }
    
    #app {
      display: none;
      min-height: 100vh;
      padding-bottom: 80px;
      background: var(--bg-main);
    }
    
    #main-content {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    
    .loading-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 10px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-input);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Balance Display */
    .balance-container {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }
    
    .ton-balance {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ton-icon { width: 20px; height: 20px; border-radius: 50%; }
    .ton-amount { font-size: 14px; font-weight: 700; color: var(--primary); }

    /* Sections */
    .section-header { text-align: center; padding: 30px 0 16px; }
    .section-title { font-size: 24px; font-weight: 800; color: var(--text-main); }
    .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    /* Buttons */
    .btn-primary, .btn-claim {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #0B0E11;
    }
    
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--text-muted); color: var(--bg-main); cursor: not-allowed; transform: none; }
    
    .btn-claim {
      background: var(--accent-green);
      color: #fff;
      animation: btnGlow 2s infinite;
    }
    
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(14, 203, 129, 0.3); }
      50% { box-shadow: 0 0 15px rgba(14, 203, 129, 0.6); }
    }

    /* Live Prices */
    .live-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .price-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .price-symbol { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
    .price-value { font-size: 18px; font-weight: 800; color: var(--text-main); margin-top: 4px; }
    .price-change { font-size: 12px; font-weight: 700; margin-top: 4px; }
    .price-change.positive { color: var(--accent-green); }
    .price-change.negative { color: var(--accent-red); }

    /* Trade Plans */
    .plan {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .plan-h {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .plan-ic {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: bold;
      font-size: 18px;
    }
    
    .plan-tt { font-size: 18px; font-weight: 800; color: var(--text-main); }
    .plan-pr { font-size: 14px; color: var(--primary); font-weight: 700; margin-top: 2px; }
    
    .plan-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }
    
    .g-it {
      background: var(--bg-input);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    
    .g-l { font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; }
    .g-v { font-size: 16px; font-weight: 800; color: var(--text-main); margin-top: 4px; }

    .prog { margin: 12px 0; }
    .progbar { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
    .progfill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--primary)); width: 0%; transition: width 0.5s; }
    .progtext { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; font-weight: 600; }
    .countdown { text-align: center; font-size: 13px; color: var(--primary); font-weight: 700; margin: 10px 0; }

    /* Wallet Redesign */
    .wallet-dashboard {
      padding: 20px 0;
    }
    
    .wallet-balance-card {
      background: linear-gradient(135deg, #1E2329 0%, #2B3139 100%);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border-color);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    
    .wallet-balance-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(252, 213, 53, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    
    .wb-label { font-size: 14px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .wb-value { font-size: 36px; font-weight: 800; color: var(--text-main); margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .wb-value img { width: 32px; height: 32px; }
    
    .wallet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .wallet-action-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .wallet-action-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
    .wallet-action-btn:active { transform: translateY(0); }
    
    .wab-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(252, 213, 53, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .wab-icon img { width: 20px; height: 20px; }
    .wab-text { font-size: 14px; font-weight: 700; color: var(--text-main); }
    
    .wallet-menu-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .wallet-menu-item:hover { background: var(--bg-input); }
    .wmi-icon { width: 24px; height: 24px; object-fit: contain; opacity: 0.8; }
    .wmi-text { flex: 1; font-size: 15px; font-weight: 600; }
    .wmi-arrow { color: var(--text-muted); font-size: 18px; }

    /* Form Elements */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: var(--text-secondary); font-weight: 700; margin-bottom: 8px; display: block; }
    
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      outline: none;
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    
    .input:focus { border-color: var(--primary); }
    
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-input);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      word-break: break-all;
      font-size: 13px;
    }
    
    .copy {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      transition: all 0.2s;
    }
    
    .copy:hover { border-color: var(--primary); }
    .copy img { width: 14px; height: 14px; filter: brightness(0) invert(1); }

    /* History List - Professional */
    .history-container {
      min-height: 100%;
      padding-bottom: 20px;
    }
    
    .history-header-section {
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-main) 100%);
      padding: 24px 20px;
      margin: -20px -20px 20px -20px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .history-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .history-main-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-main);
    }
    
    .history-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .history-stat-card {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .history-stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .history-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      margin-top: 6px;
    }
    
    .history-list {
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      padding-right: 4px;
    }
    
    .history-item {
      background: var(--bg-input);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
    }
    
    .history-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }
    
    .history-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .history-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    
    .history-type-badge.deposit {
      background: rgba(14, 203, 129, 0.15);
      color: var(--accent-green);
    }
    
    .history-type-badge.withdraw {
      background: rgba(246, 70, 93, 0.15);
      color: var(--accent-red);
    }
    
    .history-type-badge.claim {
      background: rgba(252, 213, 53, 0.15);
      color: var(--primary);
    }
    
    .history-type-badge.purchase {
      background: rgba(30, 136, 229, 0.15);
      color: var(--accent-blue);
    }
    
    .history-timestamp {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .history-amount-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .history-amount {
      font-size: 22px;
      font-weight: 800;
    }
    
    .history-amount.positive { color: var(--accent-green); }
    .history-amount.negative { color: var(--accent-red); }
    
    .history-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    
    .history-status.pending {
      background: rgba(252, 213, 53, 0.15);
      color: var(--primary);
    }
    
    .history-status.completed {
      background: rgba(14, 203, 129, 0.15);
      color: var(--accent-green);
    }
    
    .history-details-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px dashed var(--border-color);
      margin-top: 8px;
    }
    
    .history-detail-label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .history-detail-value {
      font-size: 12px;
      color: var(--text-main);
      font-weight: 600;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
    }

    /* Notification */
    .notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #000;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      z-index: 10000;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { top: 0px; opacity: 0; }
      to { top: 20px; opacity: 1; }
    }

    /* Nav */
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--bg-card);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 10px;
      z-index: 1000;
      box-shadow: 0 -4px 16px rgba(0,0,0,.2);
    }
    
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px;
      border-radius: 12px;
      transition: .2s;
    }
    
    .nav-icon { width: 24px; height: 24px; object-fit: contain; filter: grayscale(100%) brightness(.7); transition: all 0.2s; }
    .nav-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); transition: all 0.2s; }
    
    .nav-btn.active .nav-icon { filter: none; }
    .nav-btn.active .nav-label { color: var(--primary); }

    /* Full Screen Modal */
    .fullscreen-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: none;
      flex-direction: column;
      z-index: 9999;
      overflow-y: auto;
    }
    
    .modal-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .modal-title { font-size: 18px; font-weight: 800; color: var(--text-main); }
    
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--bg-input);
      border: none;
      color: var(--text-main);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .modal-close:hover { background: var(--text-muted); }
    
    .modal-content {
      flex: 1;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    
    .modal-content-box {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Timer */
    .timer {
      background: rgba(246, 70, 93, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      margin-bottom: 16px;
    }
    .t-t { color: var(--accent-red); font-weight: 800; }

    /* Chart Container */
    .chart-container {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .chart-title { font-size: 12px; font-weight: 800; text-align: center; margin-bottom: 8px; color: var(--text-secondary); }

    /* QR Code */
    .qr-container {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      display: inline-block;
      margin: 16px auto;
    }

    /* Redeem Section */
    .redeem-section {
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(252, 213, 53, 0.05) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
    }
    
    .redeem-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .redeem-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .redeem-title-group {
      flex: 1;
    }
    
    .redeem-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-main);
    }
    
    .redeem-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    .redeem-input-wrapper {
      position: relative;
      margin-bottom: 16px;
    }
    
    .redeem-input {
      width: 100%;
      padding: 18px 20px;
      padding-right: 60px;
      border-radius: 14px;
      border: 2px dashed var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      outline: none;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    
    .redeem-input:focus {
      border-color: var(--primary);
      border-style: solid;
      box-shadow: 0 0 20px rgba(252, 213, 53, 0.2);
    }
    
    .redeem-input::placeholder {
      letter-spacing: 4px;
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .redeem-char-count {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .redeem-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: #0B0E11;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .redeem-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(252, 213, 53, 0.3);
    }
    
    .redeem-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Tasks Section New Design */
    .tasks-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .task-category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    
    .task-category-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-secondary);
    }
    
    .task-item-new {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    
    .task-item-new:active { transform: scale(0.98); }
    
    .task-item-new.completed {
      opacity: 0.6;
      pointer-events: none;
    }
    
    .task-icon-box {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .task-icon-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .task-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .task-name-new {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }
    
    .task-reward-new {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-green);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .task-action-btn {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-action-btn:disabled {
      background: var(--text-muted);
      color: #fff;
    }

    .affiliate-card {
      background: linear-gradient(135deg, #1E2329 0%, #2B3139 100%);
      border: 1px solid var(--primary);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    
    .affiliate-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent-green));
    }
    
    .affiliate-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    
    .affiliate-stat-item {
      background: var(--bg-input);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }
    
    .affiliate-stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    
    .affiliate-stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
    }

      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 8px;

      font-size: 12px;
      font-family: monospace;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .referral-list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }

      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      object-fit: cover;
      flex-shrink: 0;

      min-width: 0;

      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .referral-list-id {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-family: monospace;
    }

    .referral-list-balance {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    .profile-header {
      text-align: center;
      padding: 20px 0;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      margin-bottom: 12px;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .profile-id {
      font-size: 14px;
      color: var(--text-secondary);
      font-family: monospace;
      background: var(--bg-input);
      padding: 4px 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .settings-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .setting-row:last-child { border-bottom: none; }

    .setting-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
    }

    .language-select {
      background: var(--bg-input);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 8px;

      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;

    function awardReferralCommission(earnedAmount) {
      if (!userData.referredBy) return;
      const commission = earnedAmount * 0.2;
      const referrerId = userData.referredBy;
      
      // Fetch current referrer data to ensure atomic update
      database.ref('users/' + referrerId).once('value').then(refSnap => {
        if (refSnap.exists()) {
          const referrerData = refSnap.val();
          const newBalance = (parseFloat(referrerData.tonBalance) || 0) + commission;
          const newTotalComm = (parseFloat(referrerData.totalReferralCommission) || 0) + commission;
          
          // Instant DB Update
          database.ref('users/' + referrerId).update({ 
            tonBalance: newBalance, 
            totalReferralCommission: newTotalComm 
          }).then(() => {
            console.log(`Commission ${commission} TON awarded to ${referrerId}`);
          }).catch(err => {
            console.error("Commission update failed", err);
          });
        }
      });
    }

          if (refSnap.exists()) {

            // 2. INSTANTLY AWARD 0.20 TON TO REFERRER

            const newBalance = (parseFloat(referrerData.tonBalance) || 0) + signupBonus;
            const newTotalComm = (parseFloat(referrerData.totalReferralCommission) || 0) + signupBonus;

            await database.ref('users/' + referrerId).update({
              tonBalance: newBalance,

            });

    function loadTasks(){
      const container = document.getElementById('tasksContainer');
      container.innerHTML = '<div style="text-align:center;padding:20px"><div class="loading-spinner" style="margin:0 auto"></div></div>';
      
      database.ref('tasks').once('value').then(s=>{
        const tasks=s.exists()?s.val():{};
        const categories = ['Project', 'Partner', 'Advertise'];
        let html='';
        
        categories.forEach(category=>{
          const categoryTasks = Object.keys(tasks).filter(id => tasks[id].category === category);
          if(categoryTasks.length > 0){
            html += `
              <div class="task-category-header">
                <div style="width:4px;height:16px;background:var(--primary);border-radius:2px"></div>
                <div class="task-category-title">${category} Tasks</div>
              </div>
              <div class="tasks-grid">
                ${categoryTasks.map(id=>{
                  const t=tasks[id]; 
                  const done = !!(userData.completedTasks&&userData.completedTasks[id]);
                  return `
                    <div class="task-item-new ${done ? 'completed' : ''}" id="taskItem_${id}">
                      <div class="task-icon-box">
                        <img src="${t.photo}" alt="${t.name}">
                      </div>
                      <div class="task-details">
                        <div class="task-name-new">${t.name}</div>
                        <div class="task-reward-new">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v12M6 12h12"></path>
                          </svg>
                          +${t.amount} TON
                        </div>
                      </div>
                      <button class="task-action-btn" data-id="${id}" ${done ? 'disabled' : ''}>${done ? 'Done' : 'Start'}</button>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }
        });
        
        if(!html) html = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No Tasks Available</div><div class="empty-text">Check back later for new tasks</div></div>';
        
        container.innerHTML = html;

        document.querySelectorAll('.task-action-btn').forEach(btn=>{
          btn.onclick=()=>{
            triggerHaptic('light');
            const id=btn.dataset.id; const t=tasks[id]; if(!t) return;
            if (userData.completedTasks && userData.completedTasks[id]){ window.open(t.link,'_blank'); return; }
            if (pendingTaskRewards[id]){ notify('Processing...'); return; }
            pendingTaskRewards[id]=true; btn.disabled=true; btn.textContent='Wait...';
            window.open(t.link,'_blank');
            
            setTimeout(()=>{
              if (!userData.completedTasks) userData.completedTasks={};
              userData.completedTasks[id]=true;
              const add=parseFloat(t.amount)||0;
              tonBalance = tonBalance + add;
              
              // Award 20% commission on Task Earnings
              awardReferralCommission(add);
              
              save({ tonBalance: tonBalance, completedTasks: userData.completedTasks });
              pendingTaskRewards[id]=false; 
              
              // Update UI
              btn.textContent = 'Done';
              btn.disabled = true;
              const item = document.getElementById(`taskItem_${id}`);
              if(item) item.classList.add('completed');
              
              notify(`+${add} TON earned!`);
            }, 15000);
          };
        });
      });
    }

    function loadReferralsDirectly() {
        const listContainer = document.getElementById('directReferralList');
        database.ref('users').orderByChild('referredBy').equalTo(userId).once('value').then(snapshot => {
            if (snapshot.numChildren() === 0) {
                listContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div class="empty-title">No Referrals Yet</div>
                    <div class="empty-text">Share your link to start earning!</div>
                </div>`;
                return;
            }

            let html = '';
            snapshot.forEach(child => {
                const u = child.val();
                const uId = child.key;
                const avatar = u.avatar || "https://cdn-icons-png.flaticon.com/512/1077/1077114.png";
                const name = u.name || 'Unknown User';
                const balance = u.tonBalance || 0;
                
                html += `
                <div class="referral-list-item">
                    <img src="${avatar}" class="referral-list-avatar" alt="Ref">
                    <div class="referral-list-info">
                        <div class="referral-list-name">${name}</div>
                        <div class="referral-list-id">ID: ${uId}</div>
                        <div class="referral-list-balance">${fmt(balance)} TON</div>
                    </div>
                </div>
                `;
            });
            listContainer.innerHTML = html;
        });
    }

    // Profile
    function renderProfile(){
      const html=`
        <div class="profile-header">
          <img src="${userAvatar}" class="profile-avatar" alt="avatar">
          <div class="profile-name">${userName}</div>
          <div class="profile-id">
            <span>ID: ${userId}</span> 
            <button class="copy" id="copyUid" style="border:none;background:transparent;padding:0;display:inline-flex;align-items:center"><img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNiIgaGVpZ2h0PSIxNiIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNGQ0Q1MzUiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cmVjdCB4PSI5IiB5PSI5IiB3aWR0aD0iMTMiIGhlaWdodD0iMTMiIHJ4PSIyIiByeT0iMiI+PC9yZWN0PjxwYXRoIGQ9Ik01IDE1SDRhMiAyIDAgMCAxLTItMlY1YTIgMiAwIDAgMSAyLTJoMTRhMiAyIDAgMCAxIDIgMnYxIj48L3BhdGg+PC9zdmc+" alt="Copy"></button>
          </div>
        </div>

        <div class="settings-card">
            <div class="setting-row">
                <div class="setting-label">${t('profile.language')}</div>
                <select id="langSelect" class="language-select">
                    <option value="en" ${currentLang==='en'?'selected':''}>English</option>
                    <option value="cn" ${currentLang==='cn'?'selected':''}>中文</option>
                    <option value="bn" ${currentLang==='bn'?'selected':''}>বাংলা</option>
                    <option value="ru" ${currentLang==='ru'?'selected':''}>Русский</option>
                </select>
            </div>
            <div class="setting-row">
                 <div class="setting-label">${t('profile.support')}</div>
                 <a href="https://t.me/BlockOrbit_Support" target="_blank" class="support-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    ${t('profile.supportLabel')}
                 </a>
            </div>
        </div>

        <div class="redeem-section">
          <div class="redeem-header">
            <div class="redeem-icon">🎁</div>
            <div class="redeem-title-group">
              <div class="redeem-title">${t('profile.redeemTitle')}</div>
              <div class="redeem-subtitle">${t('profile.redeemSubtitle')}</div>
            </div>
          </div>
          <div class="redeem-input-wrapper">
            <input id="redeem" maxlength="8" class="redeem-input" placeholder="XXXXXXXX" autocomplete="off" spellcheck="false">
            <span class="redeem-char-count" id="charCount">0/8</span>
          </div>
          <button class="redeem-btn" id="redeemGo">
            <span>${t('profile.redeemBtn')}</span>
          </button>
        </div>
      `;
      document.getElementById('main-content').innerHTML = html;
      
      const redeemInput = document.getElementById('redeem');
      const charCount = document.getElementById('charCount');
      redeemInput.addEventListener('input', () => {
        const len = redeemInput.value.length;
        charCount.textContent = `${len}/8`;
        if (len === 8) {
          charCount.style.color = 'var(--accent-green)';
        } else {
          charCount.style.color = 'var(--text-muted)';
        }
      });
      
      document.getElementById('copyUid').onclick=()=>{
          triggerHaptic('light');
          copy(userId);
      };

      document.getElementById('langSelect').addEventListener('change', (e) => {
          triggerHaptic('light');
          currentLang = e.target.value;
          save({ language: currentLang });
          updateLanguageUI();
      });
      
      document.getElementById('redeemGo').onclick=()=>{
        triggerHaptic('medium');
        const code=document.getElementById('redeem').value.trim().toUpperCase(); 
        if(code.length!==8){ notify('Enter valid 8-digit code'); return; }
        database.ref('redeemCodes/'+code).once('value').then(s=>{
          if(!s.exists()){ notify('Invalid or used code'); return; }
          const codeData = s.val();
          if (codeData.used >= codeData.maxUsers) { notify('Code limit reached'); return; }
          const reward = Math.random() * (0.20 - 0.01) + 0.01;
          database.ref('redeemCodes/' + code).update({ used: codeData.used + 1 });
          
          // Award Commission on Redeem Earnings
          awardReferralCommission(reward);
          
          tonBalance = tonBalance + reward;
          save({ tonBalance: tonBalance });
          notify(`Redeemed ${fmt(reward)} TON`);
          document.getElementById('redeem').value='';
          charCount.textContent = '0/8';
          charCount.style.color = 'var(--text-muted)';
        });
      };
    }

    // Modal Close

    // Bootstrap
    async function bootstrap(){
      getTelegramUserData();
      await loadCryptoPrices();
      try{
        userData = await loadUser();
        // Load saved language
        if(userData.language) {
            currentLang = userData.language;
        }
      }catch{
        const loc = localStorage.getItem('blockorbit_user_'+userId);
        userData = loc ? JSON.parse(loc) : { 
          tonBalance:0, purchasedPlans:{}, activeTrades:{}, depositHistory:[], withdrawHistory:[], tradeHistory:[], avatar:userAvatar, name:userName, referrals:0, completedTasks:{}, referralCommissions:{}, totalReferralCommission:0, createdAt: now(), referredBy: null, welcomed: false, withdrawCount: 0, hasDeposit: false, language: 'en'
        };
      }
      tonBalance = userData.tonBalance||0;
      purchasedPlans = userData.purchasedPlans||{};
      activeTrades = userData.activeTrades||{};
      depositHistory = userData.depositHistory||[];
      withdrawHistory = userData.withdrawHistory||[];
      tradeHistory = userData.tradeHistory||[];
      totalReferralCommission = userData.totalReferralCommission || 0;
      
      // Process Referral Logic (Instant Bonus Fix)
      await processReferral();

      // Count referrals
      database.ref('users').orderByChild('referredBy').equalTo(userId).once('value').then(snap => {
        referralCount = snap.numChildren();
      });

      document.getElementById('tonBalance').textContent = fmt(tonBalance);

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      
      updateLanguageUI(); // Apply initial language
      
      setInterval(loadCryptoPrices, 30000);
    }

    bootstrap();
  </script>
