<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
  <title>BlockOrbit | Professional Trading Platform</title>
  <link rel="icon" href="https://i.postimg.cc/6qxHW6rX/download.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js -->

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root{
      --primary: #00F0FF;
      --primary-hover: #00C4CC;
      --primary-glow: rgba(0, 240, 255, 0.3);
      --bg-main: #0A0E17;
      --bg-card: #111827;
      --bg-elevated: #1A2234;
      --bg-input: #0D1321;
      --text-main: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --accent-green: #10B981;
      --accent-red: #EF4444;
      --accent-gold: #F59E0B;
      --border-color: #1E293B;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --gradient-primary: linear-gradient(135deg, #00F0FF 0%, #0088FF 100%);
      --gradient-gold: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      --gradient-green: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 136, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 0%, var(--bg-main) 100%);
      pointer-events: none;
      z-index: -1;
    }
    
    #app {
      display: none;
      min-height: 100vh;
      padding-bottom: 90px;
      background: var(--bg-main);
    }
    
    #main-content {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
      box-shadow: 0 0 60px var(--primary-glow);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 40px var(--primary-glow); }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px var(--primary-glow); }
    }
    
    .loading-text {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Balance Display */
    .balance-container {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
    }
    
    .balance-card {
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.95) 0%, rgba(26, 34, 52, 0.95) 100%);
      border-radius: 16px;
      padding: 10px 20px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(20px);
    }
    
    .balance-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: cover;
    }
    
    .balance-info {
      display: flex;
      flex-direction: column;
    }
    
    .balance-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    
    .balance-amount {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Sections */
    .section-header { text-align: center; padding: 60px 0 20px; }
    .section-title { font-size: 26px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
    .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

    /* Cards */
    .card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.3), transparent);
    }

    /* Buttons */
    .btn-primary, .btn-claim {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    
    .btn-primary {
      background: var(--gradient-primary);
      color: #000;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    
    .btn-primary:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--primary-glow);
    }
    .btn-primary:disabled { 
      background: var(--text-muted); 
      color: var(--bg-main); 
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    
    .btn-claim {
      background: var(--gradient-green);
      color: #fff;
      animation: btnGlow 2s infinite;
    }
    
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
      50% { box-shadow: 0 0 25px rgba(16, 185, 129, 0.6); }
    }

    /* Live Prices */
    .live-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .price-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .price-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-primary);
      opacity: 0.5;
    }
    
    .price-symbol { font-size: 12px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .price-value { font-size: 18px; font-weight: 800; color: var(--text-main); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
    .price-change { font-size: 12px; font-weight: 700; margin-top: 6px; }
    .price-change.positive { color: var(--accent-green); }
    .price-change.negative { color: var(--accent-red); }

    /* Trade Plans */
    .plan {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .plan::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--gradient-primary);
    }
    
    .plan-h {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    
    .plan-ic {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 900;
      font-size: 14px;
      border: 1px solid var(--border-color);
    }
    
    .plan-tt { font-size: 18px; font-weight: 800; color: var(--text-main); }
    .plan-pr { font-size: 14px; color: var(--primary); font-weight: 700; margin-top: 2px; }
    
    .plan-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 14px 0;
    }
    
    .g-it {
      background: var(--bg-input);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    
    .g-l { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .g-v { font-size: 16px; font-weight: 800; color: var(--text-main); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

    .prog { margin: 12px 0; }
    .progbar { height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; border: 1px solid var(--border-color); }
    .progfill { height: 100%; background: var(--gradient-green); width: 0%; transition: width 0.5s; border-radius: 4px; }
    .progtext { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; font-weight: 600; }
    .countdown { text-align: center; font-size: 13px; color: var(--primary); font-weight: 700; margin: 10px 0; font-family: 'JetBrains Mono', monospace; }

    /* Wallet Section */
    .wallet-balance-card {
      background: linear-gradient(135deg, #111827 0%, #1F2937 100%);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .wallet-balance-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      opacity: 0.3;
    }

    .wallet-balance-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .wallet-balance-amount {
      font-size: 36px;
      font-weight: 900;
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px;
    }

    .wallet-balance-usd {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .wallet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .wallet-action-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .wallet-action-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .wallet-action-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wallet-action-icon svg {
      width: 24px;
      height: 24px;
    }

    .wallet-action-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
    }

    .wallet-menu-item {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }

    .wallet-menu-item:hover {
      border-color: rgba(0, 240, 255, 0.3);
      background: var(--bg-elevated);
    }

    .wallet-menu-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wallet-menu-icon svg {
      width: 20px;
      height: 20px;
    }

    .wallet-menu-text {
      flex: 1;
    }

    .wallet-menu-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }

    .wallet-menu-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .wallet-menu-arrow {
      color: var(--text-muted);
    }
    
    /* Form Elements */
    .form-label { font-size: 12px; color: var(--text-secondary); font-weight: 700; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      outline: none;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    .input:focus {
      border-color: var(--primary);
    }
    
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-input);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      word-break: break-all;
      font-size: 13px;
      border: 1px solid var(--border-color);
    }
    
    .copy {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      transition: all 0.2s ease;
    }

    .copy:hover {
      border-color: var(--primary);
    }
    
    .copy img { width: 16px; height: 16px; filter: brightness(0) invert(1); }

    /* History List */
    .history-list { max-height: 350px; overflow-y: auto; }
    
    .history-item {
      background: var(--bg-input);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
    }
    
    .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .history-id { font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
    .history-details { display: flex; justify-content: space-between; align-items: center; }
    .history-amount { font-weight: 800; color: var(--primary); font-size: 16px; font-family: 'JetBrains Mono', monospace; }
    .history-date { font-size: 12px; color: var(--text-secondary); }
    .history-extra { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-family: 'JetBrains Mono', monospace; word-break: break-all; }

    /* Earn Section */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    
    .stat-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }
    
    .stat-box-label { font-size: 9px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
    .stat-box-value { font-size: 18px; font-weight: 800; color: var(--primary); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
    
    .ad-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .ad-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-primary);
    }
    
    .ad-title { font-size: 18px; font-weight: 800; }
    .ad-reward { font-size: 14px; color: var(--accent-green); font-weight: 800; margin: 10px 0; }

    /* Milestone */
    .milestone-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .milestone-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .milestone-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--gradient-gold); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .milestone-info { flex: 1; }
    .milestone-title { font-size: 17px; font-weight: 800; }
    .milestone-reward { font-size: 13px; color: var(--accent-gold); font-weight: 700; }

    /* Tasks */
    .task-category {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .category-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .category-title { font-size: 16px; font-weight: 800; }
    
    .task-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-input);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
    }
    
    .task-image { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border-color); }
    .task-info { flex: 1; }
    .task-name { font-size: 14px; font-weight: 700; }
    .task-reward { font-size: 12px; color: var(--accent-green); font-weight: 800; }
    
    .task-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--gradient-primary);
      color: #000;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    
    .task-btn.completed { background: var(--text-muted); color: #fff; cursor: not-allowed; }

    /* Referrals */
    .referral-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .referral-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .referral-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .referral-title { font-size: 17px; font-weight: 800; }
    
    .referral-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .referral-stat { background: var(--bg-input); border-radius: 14px; padding: 16px; text-align: center; border: 1px solid var(--border-color); }
    .referral-stat-label { font-size: 10px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
    .referral-stat-value { font-size: 18px; font-weight: 800; color: var(--primary); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

    .referral-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-input);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
    }
    
    .referral-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }
    .referral-info { flex: 1; }
    .referral-name { font-size: 14px; font-weight: 700; }
    .referral-id { font-size: 11px; color: var(--text-secondary); }
    .referral-balance { font-size: 14px; font-weight: 800; color: var(--primary); font-family: 'JetBrains Mono', monospace; }

    /* Profile */
    .profile-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--gradient-primary);
      opacity: 0.15;
    }

    .profile-avatar {
      width: 90px;

    ];

    // DB helpers
    const userRef = (uid)=> database.ref('users/'+uid);

    async function loadUser() {
      const snap = await userRef(userId).once('value');
      if (snap.exists()) return snap.val();
      const init = {
        tonBalance:0, 
        purchasedPlans:{}, activeTrades:{},
        depositHistory:[], withdrawHistory:[], tradeHistory:[],
        avatar:userAvatar, name:userName, referrals:0, completedTasks:{},
        adStats:{ today:0, yesterday:0, thisWeek:0, thisMonth:0, lifetime:0, lastAdDate: todayISO(), lastWeekReset: weekStartISO(), lastMonthReset: monthStartISO() },
        milestones:{ milestone1500Claimed:false, milestone2500Claimed:false, milestone5500Claimed:false },
        referralCommissions:{}, totalReferralCommission:0, createdAt: now(),
        referredBy: null, welcomed: false
      };
      await userRef(userId).set(init);
      return init;

    function weekStartISO(){
      const d=new Date(); const day=d.getDay(); const diff=d.getDate()-day+(day===0?-6:1); d.setDate(diff);

    }
    function monthStartISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }

      userData = { ...userData, ...partial };
      userRef(userId).update(partial).catch(()=>{});
      localStorage.setItem('blockorbit_user_'+userId, JSON.stringify(userData));
      if (partial.tonBalance!==undefined) {

        updateBalanceDisplay();

        balanceEl.textContent = fmt(tonBalance);
      }

      if (!userData.referredBy) return;
      const commission = earnedAmount * 0.2;
      const referrerId = userData.referredBy;
      
      database.ref('users/' + referrerId).once('value').then(refSnap => {
        if (refSnap.exists()) {
          const referrerData = refSnap.val();
          const newBalance = (referrerData.tonBalance || 0) + commission;
          database.ref('users/' + referrerId).update({ 
            tonBalance: newBalance, 
            totalReferralCommission: (referrerData.totalReferralCommission || 0) + commission 
          });
        }
      });
    }

      if(tab==='profile') renderProfile();

      const eth = cryptoPrices.ETH||{price:2000,change:0};
      const usdt = cryptoPrices.USDT||{price:1,change:0};

        <div class="live-prices">

          <div class="price-card">
            <div class="price-symbol">ETH/USDT</div>
            <div class="price-value">$${(eth.price).toLocaleString()}</div>
            <div class="price-change ${eth.change>=0?'positive':'negative'}">${(eth.change>=0?'+':'')}${(eth.change||0).toFixed(2)}%</div>

        </div>

        ${TRADE_PLANS.map(p=>{
          const purchased = !!purchasedPlans[p.id];
          const tr = activeTrades[p.id];
          const canClaim = tr ? (now()-tr.lastClaim)>=86400 : false;
          const prog = tr ? (tr.claimedDays/p.duration*100) : 0;

          return `
            <div class="plan">
              <div class="plan-h">
                <div class="plan-ic">${p.icon}</div>
                <div>
                  <div class="plan-tt">${p.name}</div>
                  <div class="plan-pr">${p.price} TON</div>

              <div class="plan-g">
                <div class="g-it">
                  <div class="g-l">Daily</div>

                  <div class="g-l">Duration</div>
                  <div class="g-v">${p.duration} days</div>

              ${tr ? `

                <button class="btn-primary" id="buy_${p.id}" ${purchased?'disabled':''}>${purchased?'Purchased':'Buy Plan'}</button>
              `}
            </div>
          `;
        }).join('')}
      `;

      TRADE_PLANS.forEach(p=>{

        const claim=document.getElementById(`claim_${p.id}`);

            renderHome();

        if(claim){

            const ws = weekStartISO();
            const ms = monthStartISO();
            
            // Reset daily/weekly/monthly stats if needed
            if (userData.adStats.lastAdDate !== today) {
              userData.adStats.yesterday = userData.adStats.today;
              userData.adStats.today = 0;
              userData.adStats.lastAdDate = today;
            }
            if (userData.adStats.lastWeekReset !== ws) {
              userData.adStats.thisWeek = 0;
              userData.adStats.lastWeekReset = ws;
            }
            if (userData.adStats.lastMonthReset !== ms) {
              userData.adStats.thisMonth = 0;
              userData.adStats.lastMonthReset = ms;
            }
            
            // Increment stats
            userData.adStats.today++;
            userData.adStats.thisWeek++;
            userData.adStats.thisMonth++;
            userData.adStats.lifetime++;
            
            // Award referral commission
            awardReferralCommission(reward);
            
            // Save balance and stats
            save({ 
              tonBalance: tonBalance + reward, 
              adStats: userData.adStats 
            });
            
            notify(`+${reward} TON earned!`);
            renderEarn();
          }).catch((err)=>{
            console.error('Ad error:', err);
            adLoading = false;
            document.getElementById('watchAd').textContent='Watch Ad';
            notify('Ad cancelled or failed');
          });
        } else {
          // Fallback: still award if SDK not available (for testing)
          adLoading = false;
          document.getElementById('watchAd').textContent='Watch Ad';
          
          const reward = 0.0001;
          const today = todayISO();
          const ws = weekStartISO();
          const ms = monthStartISO();
          
          if (userData.adStats.lastAdDate !== today) {
            userData.adStats.yesterday = userData.adStats.today;
            userData.adStats.today = 0;
            userData.adStats.lastAdDate = today;
          }
          if (userData.adStats.lastWeekReset !== ws) {
            userData.adStats.thisWeek = 0;
            userData.adStats.lastWeekReset = ws;
          }
          if (userData.adStats.lastMonthReset !== ms) {
            userData.adStats.thisMonth = 0;
            userData.adStats.lastMonthReset = ms;
          }
          
          userData.adStats.today++;
          userData.adStats.thisWeek++;
          userData.adStats.thisMonth++;
          userData.adStats.lifetime++;
          
          awardReferralCommission(reward);
          save({ tonBalance: tonBalance + reward, adStats: userData.adStats });
          notify(`+${reward} TON earned!`);
          renderEarn();
        }
      };

      const setMilestone=(need,amt)=>{
        const key=`milestone${need}Claimed`;
        if ((userData.adStats?.lifetime||0)>=need && !userData.milestones?.[key]){
          const ms={...(userData.milestones||{}), [key]:true };
          save({ tonBalance: tonBalance+amt, milestones: ms });
          notify(`Claimed ${amt} TON!`);
          renderEarn();
        }
      };
      document.getElementById('m1500')?.addEventListener('click', ()=>setMilestone(1500,0.015));
      document.getElementById('m2500')?.addEventListener('click', ()=>setMilestone(2500,0.025));
      document.getElementById('m5500')?.addEventListener('click', ()=>setMilestone(5500,0.055));

      loadTasks();
    }

    function loadTasks(){
      database.ref('tasks').once('value').then(s=>{
        const tasks=s.exists()?s.val():{};
        const categories = ['Project', 'Partner', 'Advertise'];
        let html='';
        
        categories.forEach(category=>{
          const categoryTasks = Object.keys(tasks).filter(id => tasks[id].category === category);
          if(categoryTasks.length > 0){
            html += `
              <div class="task-category">
                <div class="category-header">
                  <div class="category-icon">📂</div>
                  <div class="category-title">${category}</div>
                </div>
                ${categoryTasks.map(id=>{
                  const t=tasks[id]; const done = !!(userData.completedTasks&&userData.completedTasks[id]);
                  return `
                    <div class="task-card">
                      <img src="${t.photo}" class="task-image" alt="${t.name}">
                      <div class="task-info">
                        <div class="task-name">${t.name}</div>
                        <div class="task-reward">+${t.amount} TON</div>
                      </div>
                      <button class="task-btn ${done?'completed':''}" data-id="${id}">${done?'Done':'Start'}</button>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          }
        });
        
        const c=document.createElement('div'); c.className='card'; c.innerHTML=`<div class="section-subtitle" style="text-align:center;margin-bottom:10px;font-weight:700">Tasks</div>${html||'<div class="section-subtitle" style="text-align:center;padding:20px 0">No tasks available</div>'}`;
        document.getElementById('main-content').appendChild(c);

        document.querySelectorAll('.task-btn').forEach(btn=>{
          btn.onclick=()=>{
            const id=btn.dataset.id; const t=tasks[id]; if(!t) return;
            if (userData.completedTasks && userData.completedTasks[id]){ window.open(t.link,'_blank'); return; }
            if (pendingTaskRewards[id]){ notify('Processing...'); return; }
            pendingTaskRewards[id]=true; btn.disabled=true; btn.textContent='Processing...';
            window.open(t.link,'_blank');
            setTimeout(()=>{
              if (!userData.completedTasks) userData.completedTasks={};
              userData.completedTasks[id]=true;
              const add=parseFloat(t.amount)||0;
              awardReferralCommission(add);
              save({ tonBalance: tonBalance+add, completedTasks: userData.completedTasks });
              pendingTaskRewards[id]=false; btn.textContent='Done'; notify(`+${add} TON earned!`);
            },15000);
          };
        });
      });
    }

    // Profile
    function renderProfile(){
      const html=`
        <div class="section-header">
          <div class="section-title">Profile</div>
          <div class="section-subtitle">Account settings and referrals</div>
        </div>

        <div class="profile-card">
          <img src="${userData.avatar}" alt="avatar" class="profile-avatar">
          <div class="profile-name">${userData.name}</div>
          <div class="profile-id">ID: ${userId}</div>
        </div>

        <div class="referral-card">
          <div class="referral-header">
            <div class="referral-icon">👥</div>
            <div class="referral-title">Referral Program</div>
          </div>
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;text-align:center">
            Earn 0.20 TON for each referral + 20% of their total earnings
          </div>
          <div class="row"><div>Your Link</div><div style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" id="refLink">https://t.me/blockorbit_bot/app?startapp=${userId}</div></div>
          <button class="btn-primary" style="margin-top:12px" id="copyRef">Copy Referral Link</button>
        </div>

        <div class="referral-stats">
          <div class="referral-stat">
            <div class="referral-stat-label">Referrals</div>
            <div class="referral-stat-value">${referralCount||0}</div>
          </div>
          <div class="referral-stat">
            <div class="referral-stat-label">Total Earned</div>
            <div class="referral-stat-value">${fmt((referralCount||0) * 0.20 + totalReferralCommission)}</div>
          </div>
        </div>

        <button class="btn-primary" id="viewReferralsBtn" style="margin-bottom:16px">View My Referrals</button>

        <div class="card">
          <div class="section-subtitle" style="text-align:center;margin-bottom:10px;font-weight:700">Redeem Code</div>
          <input id="redeem" maxlength="8" class="input" placeholder="Enter 8-digit code">
          <button class="btn-primary" style="margin-top:10px" id="redeemGo">Redeem</button>
        </div>
      `;
      document.getElementById('main-content').innerHTML = html;
      document.getElementById('copyRef').onclick=()=>copy(document.getElementById('refLink').textContent);
      document.getElementById('redeemGo').onclick=()=>{
        const code=document.getElementById('redeem').value.trim(); if(code.length!==8){ notify('Enter valid 8-digit code'); return; }
        database.ref('redeemCodes/'+code).once('value').then(s=>{
          if(!s.exists()){ notify('Invalid or used'); return; }
          const codeData = s.val();
          if (codeData.used >= codeData.maxUsers) { notify('Code limit reached'); return; }
          const reward = Math.random() * (0.20 - 0.01) + 0.01;
          database.ref('redeemCodes/' + code).update({ used: codeData.used + 1 });
          save({ tonBalance: tonBalance + reward });
          notify(`Redeemed ${fmt(reward)} TON`);
          document.getElementById('redeem').value='';
        });
      };
      document.getElementById('viewReferralsBtn').onclick = showReferralList;
    }

    function showReferralList() {
      const modal = document.getElementById('referralModal');
      const content = document.getElementById('referralListContent');
      database.ref('users').orderByChild('referredBy').equalTo(userId).once('value').then(snapshot => {
        if (snapshot.numChildren() === 0) {
          content.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-secondary)">You haven\'t referred anyone yet.</div>';
        } else {
          let html = '';
          snapshot.forEach(child => {
            const u = child.val();
            html += `<div class="referral-item"><img src="${u.avatar}" class="referral-avatar"><div class="referral-info"><div class="referral-name">${u.name}</div><div class="referral-id">ID: ${child.key}</div><div class="referral-balance">${fmt(u.tonBalance||0)} TON</div></div></div>`;
          });
          content.innerHTML = html;
        }
        modal.style.display = 'flex';
      });
    }

    // Modal Close
    document.getElementById('closeReferralModal').onclick = () => document.getElementById('referralModal').style.display = 'none';
    document.getElementById('referralModal').onclick = (e) => { if(e.target.id === 'referralModal') e.target.style.display = 'none'; };
    document.getElementById('closeDepositModal').onclick = () => document.getElementById('deposit-modal').style.display = 'none';
    document.getElementById('closeWithdrawModal').onclick = () => document.getElementById('withdraw-modal').style.display = 'none';
    document.getElementById('closeDepositHistoryModal').onclick = () => document.getElementById('deposit-history-modal').style.display = 'none';
    document.getElementById('closeWithdrawHistoryModal').onclick = () => document.getElementById('withdraw-history-modal').style.display = 'none';
    document.getElementById('closeActivitiesModal').onclick = () => document.getElementById('activities-modal').style.display = 'none';
    document.getElementById('closeTradesModal').onclick = () => document.getElementById('trades-modal').style.display = 'none';

    // Nav events
    document.querySelectorAll('.nav-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>showTab(btn.dataset.tab));
    });

    // Bootstrap
    async function bootstrap(){
      getTelegramUserData();
      await loadCryptoPrices();
      try{
        userData = await loadUser();
      }catch{
        const loc = localStorage.getItem('blockorbit_user_'+userId);
        userData = loc ? JSON.parse(loc) : { 
          tonBalance:0, purchasedPlans:{}, activeTrades:{}, depositHistory:[], withdrawHistory:[], tradeHistory:[], avatar:userAvatar, name:userName, referrals:0, completedTasks:{}, adStats:{today:0,yesterday:0,thisWeek:0,thisMonth:0,lifetime:0,lastAdDate:todayISO(),lastWeekReset:weekStartISO(),lastMonthReset:monthStartISO()}, milestones:{ milestone1500Claimed:false, milestone2500Claimed:false, milestone5500Claimed:false }, referralCommissions:{}, totalReferralCommission:0, createdAt: now(), referredBy: null, welcomed: false
        };
      }
      tonBalance = userData.tonBalance||0;
      purchasedPlans = userData.purchasedPlans||{};
      activeTrades = userData.activeTrades||{};
      depositHistory = userData.depositHistory||[];
      withdrawHistory = userData.withdrawHistory||[];
      tradeHistory = userData.tradeHistory||[];
      
      // Load referral count
      database.ref('users').orderByChild('referredBy').equalTo(userId).once('value').then(snap => {
        referralCount = snap.numChildren();
        let totalComm = 0;
        snap.forEach(child => {
          const u = child.val();
          totalComm += (u.tonBalance || 0) * 0.2;
        });
        totalReferralCommission = userData.totalReferralCommission || 0;
      });

      document.getElementById('tonBalance').textContent = fmt(tonBalance);

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      showTab('home');
      setInterval(loadCryptoPrices, 30000);
    }

    bootstrap();
  </script>
</body>
</html>
